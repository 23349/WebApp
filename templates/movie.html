{% extends "layout.html" %}

{% block body %}

    <div id="mOverlay" class="mOverlay">
        <div class="mContent">
            <span id="reviewClose" class="close-btn">&times;</span>
            <h2>Write a Review</h2>
            <form method="get" action="url_for{{review}}">
                <textarea name="review" placeholder="Tell us what you think..."></textarea><br>
                <button type="submit" class="submit-btn">Submit</button>
            </form>
        </div>
    </div>

<div class="movie-container">
    <div class="movie-poster">
        <img src="{{movie['imgURL']}}" alt=" A image of the movie {{movie['name']}}">
    </div>
    <div style="display: inline-block;">
        <div>
            <h1>{{movie['name']}}</h1>
            <h4>{{movie['description']}}</h4>
        </div>
        <div style="margin-top: 15vh; color: #000000; font-size: 12px; text-align: center;">
            <button class="reviewOpenButton" id="reviewOpen">Leave a Review!</button>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
    const openBtn = document.getElementById('reviewOpen');
    const closeBtn = document.getElementById('reviewClose');
    const modal = document.getElementById('mOverlay');

    openBtn.addEventListener('click', () => {modal.style.display = 'block';});
    closeBtn.addEventListener('click', () => {modal.style.display = 'none';});

    window.addEventListener('click', (event) => {
    if (event.target === modal) {modal.style.display = 'none';}});
</script>
{% endblock %}
